server:
  port: 8081

offworld:
  base-url: "http://localhost:3000"
  player-id: "beta-corp"
  api-key: "beta-secret-key-002"
  callback-url: "http://localhost:8081/webhooks"

  polling:
    ship-interval: 5s
    construction-interval: 10s

  market:
    enabled: true

  trading:
    enabled: true
    station-planet-id: "Proxima Centauri-1"
    default-quantity: 10
    min-spread: 5
    watched-goods:
      - "food"
      - "water"
      - "iron_ore"
      - "rare_metals"

  logistics:
    enabled: true
    origin-system-name: "Proxima Centauri"
    origin-planet-id: "Proxima Centauri-1"
    destination-system-name: "Sol"
    destination-planet-id: "Sol-3"
    good-name: "food"
    quantity: 10

  order-management:
    enabled: true
    max-open-orders-per-good: 2
    cancel-after-seconds: 120

  sync:
    stations-interval-ms: 5000
    ships-interval-ms: 5000
    orders-interval-ms: 5000
    market-interval-ms: 15000
    logistics-interval-ms: 8000
    trading-scan-interval-ms: 15000

logging:
  level:
    root: INFO
    com.example.offworld: DEBUG