server:
  port: 8081

offworld:
  base-url: "http://localhost:8080"
  player-id: "your-player-id"
  api-key: "your-api-key"
  callback-url: "http://localhost:8081/webhooks"
  polling:
    ship-interval: 5s
    construction-interval: 10s
  market:
    enabled: true
  trading:
    enabled: true
    station-planet-id: "Sol-3"
    default-quantity: 10
    min-spread: 5
  logistics:
    enabled: true
    origin-system-name: "Sol"
    origin-planet-id: "Sol-3"
    destination-planet-id: "Proxima Centauri-1"
    good-name: "iron_ore"
    quantity: 20
  order-management:
    enabled: true
    max-open-orders-per-good: 2
    cancel-after-seconds: 120